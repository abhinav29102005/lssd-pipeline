x-common-env: &common-env
  POSTGRES_DSN: postgresql+psycopg2://scheduler:scheduler@postgres:5432/scheduler_db
  REDIS_URL: redis://redis:6379/0
  LOG_LEVEL: INFO
  HEARTBEAT_INTERVAL: 2
  HEARTBEAT_TIMEOUT: 8
  MAX_RETRIES: 3
  SCHEDULER_ALGORITHM: least_loaded

services:
  postgres:
    image: postgres:16
    container_name: scheduler_postgres
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler_db
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scheduler_redis
    ports:
      - "6381:6379"

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: scheduler_core
    environment:
      <<: *common-env
      SIMULATE_NODES: "true"
      CLUSTER_SIZE: 100
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    command: [ "python", "-m", "src.main" ]

  worker_nodes:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    environment:
      <<: *common-env
      DEFAULT_NODE_CPU: 8
      DEFAULT_NODE_MEMORY_MB: 32768
      WORKER_POLL_INTERVAL: 0.4
      JOB_FAILURE_RATE: 0.05
    depends_on:
      - postgres
      - redis
      - scheduler
    volumes:
      - ./logs:/app/logs
    # Scale to 100+ workers:
    # docker compose up --scale worker_nodes=100

  api:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: scheduler_api
    environment:
      <<: *common-env
    depends_on:
      - postgres
      - redis
      - scheduler
    command: [ "uvicorn", "src.api.job_api:app", "--host", "0.0.0.0", "--port", "8000" ]
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: ../docker/dashboard/Dockerfile
    container_name: scheduler_dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
